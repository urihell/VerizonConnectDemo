<template>
    <lightning-card title="Shipment Tracking" icon-name="standard:shipment">
        <template lwc:if={isLoading}>
            <div class="slds-p-around_large slds-align_absolute-center">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={error}>
            <div class="slds-p-around_medium">
                <p class="slds-text-color_error">Unable to load shipment data.</p>
            </div>
        </template>

        <template lwc:if={noShipment}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <div class="slds-illustration slds-illustration_small">
                    <p class="slds-text-body_regular slds-text-color_weak">No shipment linked to this product request yet.</p>
                </div>
            </div>
        </template>

        <template lwc:if={hasShipment}>
            <!-- Status Header -->
            <div class="status-header slds-p-horizontal_medium slds-p-top_small">
                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                    <div>
                        <h2 class="shipment-link" onclick={navigateToShipment}>
                            <lightning-icon icon-name="utility:shipment" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                            {shipmentNumber}
                        </h2>
                        <p class="slds-text-body_small slds-text-color_weak">To: {shipToName}</p>
                    </div>
                    <div>
                        <span class={statusBadgeClass}>{status}</span>
                    </div>
                </div>
            </div>

            <!-- Visual Tracker -->
            <div class="tracker-container slds-p-around_medium">
                <!-- Progress Rail -->
                <div class="progress-rail">
                    <div class="progress-fill" style={progressWidth}></div>
                    <template lwc:if={showTruck}>
                        <div class="truck-icon" style={truckPosition}>
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28">
                                <path fill="#CD040B" d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9 1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                            </svg>
                        </div>
                    </template>
                </div>

                <!-- Milestone Steps -->
                <div class="steps-container">
                    <template for:each={milestones} for:item="milestone">
                        <div key={milestone.key} class={milestone.stepClass}>
                            <div class={milestone.dotClass}>
                                <template lwc:if={milestone.isCompleted}>
                                    <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon>
                                </template>
                                <template lwc:if={milestone.isCurrent}>
                                    <div class="pulse-ring"></div>
                                </template>
                            </div>
                            <span class={milestone.labelClass}>{milestone.label}</span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Confirm Delivery Action -->
            <template lwc:if={showConfirmButton}>
                <div class="confirm-section slds-p-horizontal_medium slds-p-top_small">
                    <button class="confirm-btn" onclick={handleConfirmDelivery} disabled={isConfirming}>
                        <template lwc:if={isConfirming}>
                            <lightning-spinner alternative-text="Confirming" size="small" class="btn-spinner"></lightning-spinner>
                            <span>Confirming Delivery…</span>
                        </template>
                        <template lwc:else>
                            <lightning-icon icon-name="utility:check" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                            <span>Confirm Shipment Delivery</span>
                        </template>
                    </button>
                </div>
            </template>

            <!-- Delivery Confirmed Banner -->
            <template lwc:if={deliveryMessage}>
                <div class="delivery-banner slds-p-horizontal_medium slds-p-top_small">
                    <div class="banner-content">
                        <lightning-icon icon-name="utility:success" size="x-small" variant="success" class="slds-m-right_x-small"></lightning-icon>
                        <span>{deliveryMessage}</span>
                    </div>
                </div>
            </template>

            <!-- Shipment Details Cards -->
            <div class="details-section slds-p-horizontal_medium slds-p-bottom_medium">
                <div class="slds-grid slds-wrap slds-gutters_x-small">
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                        <div class="detail-card">
                            <div class="card-header">
                                <lightning-icon icon-name="utility:location" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                <span class="card-title">Origin</span>
                            </div>
                            <p class="card-value">{originAddress}</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                        <div class="detail-card">
                            <div class="card-header">
                                <lightning-icon icon-name="utility:pin" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                <span class="card-title">Destination</span>
                            </div>
                            <p class="card-value">{destinationAddress}</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                        <div class="detail-card">
                            <div class="card-header">
                                <lightning-icon icon-name="utility:transit" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                <span class="card-title">Carrier</span>
                            </div>
                            <p class="card-value">{carrier}</p>
                            <template lwc:if={trackingNumber}>
                                <p class="card-sub">
                                    <template lwc:if={trackingUrl}>
                                        <a href={trackingUrl} target="_blank" rel="noopener">{trackingNumber}</a>
                                    </template>
                                    <template lwc:else>{trackingNumber}</template>
                                </p>
                            </template>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_x-small">
                        <div class="detail-card">
                            <div class="card-header">
                                <lightning-icon icon-name="utility:date_input" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                <span class="card-title">
                                    <template lwc:if={isDelivered}>Delivered</template>
                                    <template lwc:else>Expected Delivery</template>
                                </span>
                            </div>
                            <template lwc:if={actualDelivery}>
                                <p class="card-value delivered-text">{actualDelivery}</p>
                            </template>
                            <template lwc:else>
                                <p class="card-value">{expectedDelivery}</p>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </lightning-card>
</template>
